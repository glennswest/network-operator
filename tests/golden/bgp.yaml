apiVersion: v1
kind: ConfigMap
metadata:
  labels:
    app.kubernetes.io/managed-by: network-operator
    app.kubernetes.io/part-of: cilium
    network.storm.io/owner: cluster
  name: cilium-config
  namespace: kube-system
data:
  agent-health-port: '9879'
  auto-direct-node-routes: 'true'
  bpf-lb-external-clusterip: 'false'
  bpf-map-dynamic-size-ratio: '0.0025'
  cluster-id: '0'
  cluster-name: default
  cluster-pool-ipv4-cidr: 10.244.0.0/16
  cluster-pool-ipv4-mask-size: '24'
  cni-exclusive: 'true'
  cni-log-file: /var/run/cilium/cilium-cni.log
  custom-cni-conf: 'false'
  debug: 'false'
  enable-bgp-control-plane: 'true'
  enable-bpf-masquerade: 'true'
  enable-endpoint-health-checking: 'true'
  enable-health-check-nodeport: 'true'
  enable-health-checking: 'true'
  enable-host-legacy-routing: 'false'
  enable-ipsec: 'false'
  enable-ipv4: 'true'
  enable-ipv4-masquerade: 'true'
  enable-ipv6: 'false'
  enable-ipv6-masquerade: 'false'
  enable-k8s-networkpolicy: 'true'
  enable-l2-announcements: 'false'
  enable-l7-proxy: 'true'
  enable-lb-ipam: 'true'
  enable-policy: default
  enable-session-affinity: 'true'
  enable-wireguard: 'false'
  external-envoy-proxy: 'false'
  identity-allocation-mode: crd
  ipam: cluster-pool
  ipv4-native-routing-cidr: 10.244.0.0/16
  k8s-service-host: 192.168.8.98
  k8s-service-port: '6443'
  kube-proxy-replacement: 'true'
  monitor-aggregation: medium
  monitor-aggregation-flags: all
  monitor-aggregation-interval: 5s
  operator-api-serve-addr: 127.0.0.1:9234
  preallocate-bpf-maps: 'false'
  routing-mode: native
  write-cni-conf-when-ready: /host/etc/cni/net.d/05-cilium.conflist
---
apiVersion: apps/v1
kind: DaemonSet
metadata:
  labels:
    app.kubernetes.io/managed-by: network-operator
    app.kubernetes.io/part-of: cilium
    k8s-app: cilium
    network.storm.io/owner: cluster
  name: cilium
  namespace: kube-system
spec:
  selector:
    matchLabels:
      k8s-app: cilium
  template:
    metadata:
      labels:
        app.kubernetes.io/managed-by: network-operator
        app.kubernetes.io/part-of: cilium
        k8s-app: cilium
        network.storm.io/owner: cluster
    spec:
      containers:
      - args:
        - --config-dir=/tmp/cilium/config-map
        command:
        - cilium-agent
        env:
        - name: K8S_NODE_NAME
          valueFrom:
            fieldRef:
              apiVersion: v1
              fieldPath: spec.nodeName
        - name: CILIUM_K8S_NAMESPACE
          valueFrom:
            fieldRef:
              apiVersion: v1
              fieldPath: metadata.namespace
        - name: KUBERNETES_SERVICE_HOST
          value: 192.168.8.98
        - name: KUBERNETES_SERVICE_PORT
          value: '6443'
        - name: CILIUM_CLUSTERMESH_CONFIG
          valueFrom:
            configMapKeyRef:
              key: clustermesh-config
              name: cilium-config
              optional: true
        - name: GOMEMLIMIT
          value: 1GiB
        image: quay.io/cilium/cilium:v1.19.6
        imagePullPolicy: IfNotPresent
        livenessProbe:
          failureThreshold: 10
          httpGet:
            host: 127.0.0.1
            path: /healthz
            port: 9879
            scheme: HTTP
          periodSeconds: 30
          timeoutSeconds: 5
        name: cilium-agent
        readinessProbe:
          failureThreshold: 3
          httpGet:
            host: 127.0.0.1
            path: /healthz
            port: 9879
            scheme: HTTP
          periodSeconds: 30
          timeoutSeconds: 5
        securityContext:
          privileged: true
          seLinuxOptions:
            level: s0
            type: spc_t
        startupProbe:
          failureThreshold: 24
          httpGet:
            host: 127.0.0.1
            path: /healthz
            port: 9879
            scheme: HTTP
          initialDelaySeconds: 5
          periodSeconds: 5
        terminationMessagePolicy: FallbackToLogsOnError
        volumeMounts:
        - mountPath: /tmp/cilium/config-map
          name: cilium-config-path
          readOnly: true
        - mountPath: /var/run/cilium
          name: cilium-run
        - mountPath: /sys/fs/bpf
          mountPropagation: Bidirectional
          name: bpf-maps
        - mountPath: /host/etc/cni/net.d
          name: etc-cni-netd
        - mountPath: /host/opt/cni/bin
          name: cni-path
        - mountPath: /lib/modules
          name: lib-modules
          readOnly: true
        - mountPath: /run/xtables.lock
          name: xtables-lock
        - mountPath: /host/proc/sys/net
          name: host-proc-sys-net
        - mountPath: /host/proc/sys/kernel
          name: host-proc-sys-kernel
        - mountPath: /tmp
          name: tmp
      dnsPolicy: ClusterFirstWithHostNet
      hostNetwork: true
      hostPID: true
      initContainers:
      - command:
        - cilium-dbg
        - build-config
        env:
        - name: K8S_NODE_NAME
          valueFrom:
            fieldRef:
              apiVersion: v1
              fieldPath: spec.nodeName
        - name: CILIUM_K8S_NAMESPACE
          valueFrom:
            fieldRef:
              apiVersion: v1
              fieldPath: metadata.namespace
        - name: KUBERNETES_SERVICE_HOST
          value: 192.168.8.98
        - name: KUBERNETES_SERVICE_PORT
          value: '6443'
        image: quay.io/cilium/cilium:v1.19.6
        imagePullPolicy: IfNotPresent
        name: config
        terminationMessagePolicy: FallbackToLogsOnError
        volumeMounts:
        - mountPath: /tmp
          name: tmp
      - args:
        - cp /usr/bin/cilium-mount /hostbin/cilium-mount; nsenter --cgroup=/hostproc/1/ns/cgroup --mount=/hostproc/1/ns/mnt "${BIN_PATH}/cilium-mount" $CGROUP_ROOT; rm /hostbin/cilium-mount
        command:
        - sh
        - -ec
        env:
        - name: CGROUP_ROOT
          value: /run/cilium/cgroupv2
        - name: BIN_PATH
          value: /opt/cni/bin
        image: quay.io/cilium/cilium:v1.19.6
        imagePullPolicy: IfNotPresent
        name: mount-cgroup
        securityContext:
          privileged: true
          seLinuxOptions:
            level: s0
            type: spc_t
        terminationMessagePolicy: FallbackToLogsOnError
        volumeMounts:
        - mountPath: /hostproc
          name: hostproc
        - mountPath: /hostbin
          name: cni-path
      - args:
        - cp /usr/bin/cilium-sysctlfix /hostbin/cilium-sysctlfix; nsenter --mount=/hostproc/1/ns/mnt "${BIN_PATH}/cilium-sysctlfix"; rm /hostbin/cilium-sysctlfix
        command:
        - sh
        - -ec
        env:
        - name: BIN_PATH
          value: /opt/cni/bin
        image: quay.io/cilium/cilium:v1.19.6
        imagePullPolicy: IfNotPresent
        name: apply-sysctl-overwrites
        securityContext:
          privileged: true
          seLinuxOptions:
            level: s0
            type: spc_t
        terminationMessagePolicy: FallbackToLogsOnError
        volumeMounts:
        - mountPath: /hostproc
          name: hostproc
        - mountPath: /hostbin
          name: cni-path
      - args:
        - mount | grep "/sys/fs/bpf type bpf" || mount -t bpf bpf /sys/fs/bpf
        command:
        - /bin/bash
        - -c
        - --
        image: quay.io/cilium/cilium:v1.19.6
        imagePullPolicy: IfNotPresent
        name: mount-bpf-fs
        securityContext:
          privileged: true
          seLinuxOptions:
            level: s0
            type: spc_t
        terminationMessagePolicy: FallbackToLogsOnError
        volumeMounts:
        - mountPath: /sys/fs/bpf
          mountPropagation: Bidirectional
          name: bpf-maps
      - command:
        - /init-container.sh
        env:
        - name: CILIUM_ALL_STATE
          valueFrom:
            configMapKeyRef:
              key: clean-cilium-state
              name: cilium-config
              optional: true
        - name: CILIUM_BPF_STATE
          valueFrom:
            configMapKeyRef:
              key: clean-cilium-bpf-state
              name: cilium-config
              optional: true
        image: quay.io/cilium/cilium:v1.19.6
        imagePullPolicy: IfNotPresent
        name: clean-cilium-state
        securityContext:
          privileged: true
          seLinuxOptions:
            level: s0
            type: spc_t
        terminationMessagePolicy: FallbackToLogsOnError
        volumeMounts:
        - mountPath: /sys/fs/bpf
          mountPropagation: Bidirectional
          name: bpf-maps
        - mountPath: /run/cilium/cgroupv2
          name: cilium-cgroup
        - mountPath: /var/run/cilium
          name: cilium-run
      - command:
        - /install-plugin.sh
        image: quay.io/cilium/cilium:v1.19.6
        imagePullPolicy: IfNotPresent
        name: install-cni-binaries
        securityContext:
          privileged: true
          seLinuxOptions:
            level: s0
            type: spc_t
        terminationMessagePolicy: FallbackToLogsOnError
        volumeMounts:
        - mountPath: /host/opt/cni/bin
          name: cni-path
      priorityClassName: system-node-critical
      restartPolicy: Always
      serviceAccountName: cilium
      terminationGracePeriodSeconds: 1
      tolerations:
      - operator: Exists
      volumes:
      - emptyDir: {}
        name: tmp
      - hostPath:
          path: /var/run/cilium
          type: DirectoryOrCreate
        name: cilium-run
      - hostPath:
          path: /sys/fs/bpf
          type: DirectoryOrCreate
        name: bpf-maps
      - hostPath:
          path: /proc
          type: Directory
        name: hostproc
      - hostPath:
          path: /run/cilium/cgroupv2
          type: DirectoryOrCreate
        name: cilium-cgroup
      - hostPath:
          path: /opt/cni/bin
          type: DirectoryOrCreate
        name: cni-path
      - hostPath:
          path: /etc/cni/net.d
          type: DirectoryOrCreate
        name: etc-cni-netd
      - hostPath:
          path: /lib/modules
          type: Directory
        name: lib-modules
      - hostPath:
          path: /run/xtables.lock
          type: FileOrCreate
        name: xtables-lock
      - hostPath:
          path: /proc/sys/net
          type: Directory
        name: host-proc-sys-net
      - hostPath:
          path: /proc/sys/kernel
          type: Directory
        name: host-proc-sys-kernel
      - configMap:
          name: cilium-config
        name: cilium-config-path
  updateStrategy:
    rollingUpdate:
      maxUnavailable: 2
    type: RollingUpdate
---
apiVersion: apps/v1
kind: Deployment
metadata:
  labels:
    app.kubernetes.io/managed-by: network-operator
    app.kubernetes.io/part-of: cilium
    io.cilium/app: operator
    name: cilium-operator
    network.storm.io/owner: cluster
  name: cilium-operator
  namespace: kube-system
spec:
  replicas: 1
  selector:
    matchLabels:
      io.cilium/app: operator
      name: cilium-operator
  strategy:
    type: Recreate
  template:
    metadata:
      labels:
        app.kubernetes.io/managed-by: network-operator
        app.kubernetes.io/part-of: cilium
        io.cilium/app: operator
        name: cilium-operator
        network.storm.io/owner: cluster
    spec:
      affinity:
        podAntiAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
          - labelSelector:
              matchLabels:
                io.cilium/app: operator
            topologyKey: kubernetes.io/hostname
      containers:
      - args:
        - --config-dir=/tmp/cilium/config-map
        - --debug=$(CILIUM_DEBUG)
        command:
        - cilium-operator-generic
        env:
        - name: K8S_NODE_NAME
          valueFrom:
            fieldRef:
              apiVersion: v1
              fieldPath: spec.nodeName
        - name: CILIUM_K8S_NAMESPACE
          valueFrom:
            fieldRef:
              apiVersion: v1
              fieldPath: metadata.namespace
        - name: KUBERNETES_SERVICE_HOST
          value: 192.168.8.98
        - name: KUBERNETES_SERVICE_PORT
          value: '6443'
        - name: CILIUM_DEBUG
          valueFrom:
            configMapKeyRef:
              key: debug
              name: cilium-config
              optional: true
        image: quay.io/cilium/operator-generic:v1.19.6
        imagePullPolicy: IfNotPresent
        livenessProbe:
          failureThreshold: 3
          httpGet:
            host: 127.0.0.1
            path: /healthz
            port: 9234
            scheme: HTTP
          initialDelaySeconds: 60
          periodSeconds: 10
          timeoutSeconds: 3
        name: cilium-operator
        readinessProbe:
          failureThreshold: 5
          httpGet:
            host: 127.0.0.1
            path: /healthz
            port: 9234
            scheme: HTTP
          initialDelaySeconds: 0
          periodSeconds: 5
          timeoutSeconds: 3
        terminationMessagePolicy: FallbackToLogsOnError
        volumeMounts:
        - mountPath: /tmp/cilium/config-map
          name: cilium-config-path
          readOnly: true
      dnsPolicy: ClusterFirstWithHostNet
      hostNetwork: true
      priorityClassName: system-cluster-critical
      restartPolicy: Always
      serviceAccountName: cilium-operator
      tolerations:
      - operator: Exists
      volumes:
      - configMap:
          name: cilium-config
        name: cilium-config-path
---
apiVersion: cilium.io/v2
kind: CiliumLoadBalancerIPPool
metadata:
  labels:
    app.kubernetes.io/managed-by: network-operator
    app.kubernetes.io/part-of: cilium
    network.storm.io/owner: cluster
  name: storm-default
spec:
  blocks:
  - cidr: 192.168.8.240/28
---
apiVersion: cilium.io/v2
kind: CiliumBGPClusterConfig
metadata:
  labels:
    app.kubernetes.io/managed-by: network-operator
    app.kubernetes.io/part-of: cilium
    network.storm.io/owner: cluster
  name: storm
spec:
  bgpInstances:
  - localASN: 64512
    name: asn64512
    peers:
    - name: peer-192-168-8-1
      peerASN: 64512
      peerAddress: 192.168.8.1
      peerConfigRef:
        name: storm-peers
    - name: peer-192-168-8-2
      peerASN: 64512
      peerAddress: 192.168.8.2
      peerConfigRef:
        name: storm-peers
---
apiVersion: cilium.io/v2
kind: CiliumBGPPeerConfig
metadata:
  labels:
    app.kubernetes.io/managed-by: network-operator
    app.kubernetes.io/part-of: cilium
    network.storm.io/owner: cluster
  name: storm-peers
spec:
  families:
  - advertisements:
      matchLabels:
        advertise: storm
    afi: ipv4
    safi: unicast
---
apiVersion: cilium.io/v2
kind: CiliumBGPAdvertisement
metadata:
  labels:
    advertise: storm
    app.kubernetes.io/managed-by: network-operator
    app.kubernetes.io/part-of: cilium
    network.storm.io/owner: cluster
  name: storm-advertisements
spec:
  advertisements:
  - advertisementType: PodCIDR
  - advertisementType: Service
    selector:
      matchLabels: {}
    service:
      addresses:
      - LoadBalancerIP

# BGP mode: native routing, Cilium BGP advertises pod CIDRs + LB VIPs (ECMP).
apiVersion: network.storm.io/v1
kind: Network
metadata:
  name: cluster
spec:
  cni: cilium
  mode: bgp
  clusterNetwork: ["10.244.0.0/16"]
  serviceNetwork: ["10.96.0.0/12"]
  cilium:
    version: "1.19.6"
    kubeProxyReplacement: true
    k8sServiceHost: "192.168.8.98"
    k8sServicePort: 6443
    routing:
      mode: native
    loadBalancer:
      ipam: true
      pools: ["192.168.8.240/28"]
      announce: bgp
      bgp:
        localASN: 64512
        peers:
        - address: "192.168.8.1"
          asn: 64512
